<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 776" width="1240" role="img" aria-label="AWS architecture diagram of palworld-ondemand">
  <style>
    text { fill: #1e2a36; font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Noto Sans JP", sans-serif; }
    .t-title  { font-size: 14px; font-weight: 600; }
    .t-sub    { font-size: 11px; fill: #5b6b7a; }
    .t-mono   { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; fill: #5b6b7a; }
    .t-zone   { font-size: 12px; font-weight: 600; fill: #5b6b7a; letter-spacing: 0.06em; }
    .t-edge   { font-size: 11.5px; font-weight: 600; }
    .t-badge  { font-size: 12px; font-weight: 700; fill: #ffffff; }
    .t-header { font-size: 14px; font-weight: 700; fill: #ffffff; }
    .zone-aws     { fill: none; stroke: #8595a3; stroke-width: 1.4; }
    .zone-cluster { fill: #fdf9f5; stroke: #dd6b10; stroke-width: 1.4; }
    .zone-task    { fill: none; stroke: #5b6b7a; stroke-width: 1.2; stroke-dasharray: 5 4; }
    .box          { stroke-width: 1.4; }
    .box-plain    { fill: #ffffff; stroke: #c8d2da; }
    .box-compute  { fill: #fbefe5; stroke: #d59461; }
    .box-notify   { fill: #fbe9f1; stroke: #d16fa2; }
    .box-storage  { fill: #eef3e5; stroke: #92b36c; }
    .box-discord  { fill: #f0f1fe; stroke: #8a96e7; }
    .edge path { fill: none; stroke-width: 2; stroke-linejoin: round; }
    .edge-launch path { stroke: #dd6b10; }
    .edge-notify path { stroke: #d91e74; }
    .edge-play   path { stroke: #0f8a80; }
    .edge-util   path { stroke: #8595a3; stroke-width: 1.6; }
    .edge-opt    path { stroke: #8595a3; stroke-width: 1.6; stroke-dasharray: 4 4; }
    .badge-launch { fill: #dd6b10; }
    .badge-notify { fill: #d91e74; }
    .badge-play   { fill: #0f8a80; }
    .lbl-launch { fill: #dd6b10; }
    .lbl-notify { fill: #d91e74; }
    .lbl-play   { fill: #0f8a80; }
  </style>

  <defs>
    <marker id="m-launch" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#dd6b10"/>
    </marker>
    <marker id="m-notify" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d91e74"/>
    </marker>
    <marker id="m-play" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0f8a80"/>
    </marker>
    <marker id="m-util" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8595a3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="776" fill="#ffffff"/>

  <!-- ===== zones ===== -->
  <rect class="zone-aws" x="330" y="36" width="850" height="644" rx="14"/>
  <text class="t-zone" x="356" y="64">AWS Cloud — single CDK stack (SERVER_REGION)</text>

  <!-- ===== Discord side ===== -->
  <g>
    <rect class="box box-plain" x="48" y="56" width="190" height="48" rx="24"/>
    <text class="t-title" x="143" y="85" text-anchor="middle">Discord user</text>
  </g>

  <g>
    <rect class="box box-discord" x="48" y="170" width="190" height="160" rx="12"/>
    <path fill="#5865f2" d="M48 182 a12 12 0 0 1 12 -12 h166 a12 12 0 0 1 12 12 v24 h-190 z"/>
    <text class="t-header" x="143" y="194" text-anchor="middle">Discord</text>
    <rect class="box box-plain" x="60" y="218" width="166" height="40" rx="8"/>
    <text class="t-mono" x="143" y="243" text-anchor="middle" style="fill: #1e2a36">/start command</text>
    <rect class="box box-plain" x="60" y="270" width="166" height="40" rx="8"/>
    <text class="t-sub" x="143" y="295" text-anchor="middle">notification channel (webhook)</text>
  </g>

  <g>
    <rect class="box box-plain" x="48" y="700" width="190" height="48" rx="24"/>
    <text class="t-title" x="143" y="729" text-anchor="middle">Palworld client</text>
  </g>

  <!-- ===== interactions Lambda ===== -->
  <g>
    <rect class="box box-compute" x="360" y="194" width="190" height="88" rx="12"/>
    <text class="t-title" x="455" y="222" text-anchor="middle">Interactions Lambda</text>
    <text class="t-sub" x="455" y="243" text-anchor="middle">Ed25519 signature + guild check</text>
    <text class="t-mono" x="455" y="264" text-anchor="middle">Function URL</text>
  </g>

  <!-- ===== ECS cluster ===== -->
  <g>
    <rect class="zone-cluster" x="620" y="76" width="536" height="290" rx="14"/>
    <text class="t-title" x="644" y="104" style="fill: #dd6b10">Amazon ECS cluster</text>
    <text class="t-sub" x="644" y="121">Fargate Spot / desiredCount 0 ⇄ 1</text>
    <rect class="zone-task" x="644" y="132" width="492" height="210" rx="10"/>
    <text class="t-sub" x="668" y="156">Fargate task (x86_64, public IP)</text>
  </g>

  <g>
    <rect class="box box-compute" x="668" y="180" width="200" height="132" rx="10"/>
    <text class="t-title" x="768" y="222" text-anchor="middle">palworld-server</text>
    <text class="t-sub" x="768" y="245" text-anchor="middle">game server</text>
    <text class="t-mono" x="768" y="278" text-anchor="middle">UDP 8211 / 27015</text>
  </g>

  <g>
    <rect class="box box-compute" x="912" y="180" width="200" height="132" rx="10"/>
    <text class="t-title" x="1012" y="222" text-anchor="middle">watchdog</text>
    <text class="t-sub" x="1012" y="245" text-anchor="middle">polls player count</text>
    <circle class="badge-play" cx="946" cy="274" r="10"/>
    <text class="t-badge" x="946" y="278.5" text-anchor="middle" style="font-size: 11px">8</text>
    <text class="t-sub" x="962" y="278">scales to 0 when idle</text>
  </g>

  <g class="edge edge-util">
    <path d="M872 246 L908 246" marker-end="url(#m-util)" marker-start="url(#m-util)"/>
    <text class="t-mono" x="890" y="332" text-anchor="middle">REST API (localhost:8212)</text>
  </g>

  <!-- ===== SNS / forwarder / SSM / EFS ===== -->
  <g>
    <rect class="box box-notify" x="620" y="430" width="180" height="76" rx="12"/>
    <text class="t-title" x="710" y="462" text-anchor="middle">SNS topic</text>
    <text class="t-sub" x="710" y="484" text-anchor="middle">central notification hub</text>
  </g>

  <g>
    <rect class="box box-compute" x="620" y="556" width="180" height="76" rx="12"/>
    <text class="t-title" x="710" y="588" text-anchor="middle">forwarder Lambda</text>
    <text class="t-sub" x="710" y="610" text-anchor="middle">POSTs to Discord webhook</text>
  </g>

  <g>
    <rect class="box box-notify" x="900" y="556" width="200" height="76" rx="12"/>
    <text class="t-title" x="1000" y="588" text-anchor="middle">SSM Parameter Store</text>
    <text class="t-sub" x="1000" y="610" text-anchor="middle">webhook URL (SecureString)</text>
  </g>

  <g>
    <rect class="box box-storage" x="990" y="430" width="166" height="76" rx="12"/>
    <text class="t-title" x="1073" y="462" text-anchor="middle">Amazon EFS</text>
    <text class="t-sub" x="1073" y="484" text-anchor="middle">persistent save data</text>
  </g>

  <g>
    <rect x="350" y="424" width="250" height="86" rx="12" fill="#ffffff" stroke="#8595a3" stroke-dasharray="5 4" stroke-width="1.2"/>
    <text class="t-sub" x="475" y="450" text-anchor="middle" style="font-weight: 600; fill: #1e2a36">Optional: billing report</text>
    <text class="t-sub" x="475" y="472" text-anchor="middle" style="font-size: 10.5px">EventBridge (every 6 h) → Lambda</text>
    <text class="t-sub" x="475" y="490" text-anchor="middle" style="font-size: 10.5px">Cost Explorer → month-to-date to SNS</text>
  </g>

  <!-- ===== edges ===== -->
  <g class="edge edge-launch">
    <path d="M143 104 L143 170" marker-end="url(#m-launch)"/>
    <circle class="badge-launch" cx="143" cy="135" r="12"/>
    <text class="t-badge" x="143" y="139.5" text-anchor="middle">1</text>
    <text class="t-edge lbl-launch" x="164" y="140">/start</text>
  </g>

  <g class="edge edge-launch">
    <path d="M238 238 L360 238" marker-end="url(#m-launch)"/>
    <circle class="badge-launch" cx="299" cy="238" r="12"/>
    <text class="t-badge" x="299" y="242.5" text-anchor="middle">2</text>
    <text class="t-edge lbl-launch" x="299" y="218" text-anchor="middle">POST</text>
  </g>

  <g class="edge edge-launch">
    <path d="M455 194 L455 150 L620 150" marker-end="url(#m-launch)"/>
    <circle class="badge-launch" cx="455" cy="172" r="12"/>
    <text class="t-badge" x="455" y="176.5" text-anchor="middle">3</text>
    <text class="t-edge lbl-launch" x="537" y="140" text-anchor="middle">desiredCount 0 → 1</text>
  </g>

  <g class="edge edge-notify">
    <path d="M930 312 L930 468 L800 468" marker-end="url(#m-notify)"/>
    <circle class="badge-notify" cx="930" cy="390" r="12"/>
    <text class="t-badge" x="930" y="394.5" text-anchor="middle">4</text>
    <text class="t-edge lbl-notify" x="912" y="394" text-anchor="end">startup / shutdown notice</text>
  </g>

  <g class="edge edge-notify">
    <path d="M710 506 L710 556" marker-end="url(#m-notify)"/>
    <circle class="badge-notify" cx="710" cy="531" r="12"/>
    <text class="t-badge" x="710" y="535.5" text-anchor="middle">5</text>
  </g>

  <g class="edge edge-notify">
    <path d="M900 594 L800 594" marker-end="url(#m-notify)"/>
    <text class="t-edge lbl-notify" x="850" y="582" text-anchor="middle" style="font-size: 10.5px">fetch URL</text>
  </g>

  <g class="edge edge-notify">
    <path d="M620 594 L143 594 L143 330" marker-end="url(#m-notify)"/>
    <circle class="badge-notify" cx="382" cy="594" r="12"/>
    <text class="t-badge" x="382" y="598.5" text-anchor="middle">6</text>
    <text class="t-edge lbl-notify" x="382" y="578" text-anchor="middle">posts "🟢 online at IP:8211"</text>
  </g>

  <g class="edge edge-play">
    <path d="M238 724 L1206 724 L1206 246 L1140 246" marker-end="url(#m-play)"/>
    <circle class="badge-play" cx="600" cy="724" r="12"/>
    <text class="t-badge" x="600" y="728.5" text-anchor="middle">7</text>
    <text class="t-edge lbl-play" x="600" y="706" text-anchor="middle">UDP 8211 — connect to the IP:port from the notification</text>
  </g>

  <g class="edge edge-util">
    <path d="M1080 342 L1080 430" marker-end="url(#m-util)"/>
    <text class="t-sub" x="1092" y="390" style="font-size: 10.5px">save</text>
  </g>

  <g class="edge edge-opt">
    <path d="M600 468 L620 468" marker-end="url(#m-util)"/>
  </g>
</svg>
